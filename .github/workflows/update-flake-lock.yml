name: Update Flake Inputs
on:
  workflow_dispatch:
  schedule:
    # Every Saturday at noon
    - cron: "0 12 * * sat"

permissions:
  contents: write
  pull-requests: write

jobs:
  flake_lock:
    runs-on: ubuntu-latest
    outputs:
      pull-request-number: ${{ steps.update.outputs.pull-request-number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up SSH for nix-secrets repository access
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.NIX_SECRETS_SSH_KEY }}

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ github.token }}
      - name: Update flake lockfile
        id: update
        uses: DeterminateSystems/update-flake-lock@v28
        with:
          token: ${{ secrets.GH_TOKEN_FOR_FLAKE_UPDATE }}
          branch: update-flake/${{ github.ref_name }}
          commit-msg: "build(flake): update lockfile"
          pr-title: "build(flake): update flake inputs"
          pr-body: |
            Automated updates by the [update-flake-lock](https://github.com/DeterminateSystems/update-flake-lock) GitHub Action.

            ```{{ env.GIT_COMMIT_MESSAGE }}```
          pr-labels: |
            dependencies
            automation
      - name: Print summary
        env:
          num: ${{ steps.update.outputs.pull-request-number }}
          url: ${{ steps.update.outputs.pull-request-url }}
          operation: ${{ steps.update.outputs.pull-request-operation }}
        run: |
          echo "Pull request #$num was $operation."
          echo "$url"
          (
            echo "Pull request"
            echo
            echo "[#$num]($url) was $operation."
            echo
          ) >> $GITHUB_STEP_SUMMARY

  auto_merge:
    needs: flake_lock
    if: needs.flake_lock.outputs.pull-request-number != ''
    runs-on: ubuntu-latest
    steps:
      - name: Wait for checks to pass, then merge
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_FLAKE_UPDATE }}
          PR: ${{ needs.flake_lock.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        run: |
          # Give triggered workflows a moment to register on the PR
          sleep 15
          checks=$(gh pr checks "$PR" --repo "$REPO" --json name | jq 'length')
          if [ "$checks" -eq 0 ]; then
            echo "No checks registered on PR #$PR — refusing to auto-merge"
            exit 1
          fi
          echo "Found $checks check(s); watching until they finish"
          gh pr checks "$PR" --repo "$REPO" --watch --interval 30 --fail-fast
          gh pr merge "$PR" --repo "$REPO" --merge
